<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="EOSS Barcode Scanner — Retail Staff Tool" />

  <title>EOSS Scanner</title>

  <!-- Preconnect for faster font load -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />

  <!-- ZXing barcode scanner (free, no paid API) -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="header">
    <div class="header-brand">
      <div class="header-logo">🏷️</div>
      <div>
        <div class="header-title">EOSS Scanner</div>
        <div class="header-sub">Stock Segregation Tool</div>
      </div>
    </div>
    <div class="header-status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">No data</span>
    </div>
  </header>

  <!-- ── Upload Barcode Master ────────────────────────────── -->
  <section class="upload-section" id="uploadSection">
    <div class="upload-header">
      <span class="upload-icon">📋</span>
      <div>
        <div class="upload-label">Barcode Master</div>
        <div class="upload-info">Upload CSV with Barcode, Offer columns</div>
      </div>
    </div>

    <button class="upload-btn" id="uploadBtn">
      📂 Choose CSV / Excel file
    </button>

    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.txt" />

    <div class="data-badge hidden" id="dataBadge"></div>
  </section>

  <!-- ── Scanner Controls ──────────────────────────────────── -->
  <section class="scan-section">

    <!-- Camera viewfinder -->
    <div class="camera-container" id="cameraContainer">
      <video id="video" playsinline muted></video>
      <div class="scan-overlay">
        <div class="scan-frame">
          <div class="scan-line"></div>
        </div>
      </div>
      <div class="scan-label">Point camera at barcode</div>
      <button class="scan-stop-btn" id="stopCameraBtn">✕ Close</button>
    </div>

    <!-- Scan button -->
    <button class="scan-btn" id="scanBtn" aria-label="Open camera to scan barcode">
      <span class="scan-btn-icon">📷</span>
      <span id="scanBtnText">Scan Barcode</span>
    </button>

    <!-- Manual entry -->
    <div class="manual-section">
      <input
        type="text"
        id="manualInput"
        class="manual-input"
        placeholder="Enter barcode manually"
        inputmode="text"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        maxlength="50"
        aria-label="Manual barcode entry"
      />
      <button class="manual-submit" id="manualSubmit" aria-label="Submit barcode">
        Go →
      </button>
    </div>
  </section>

  <!-- ── Voice Toggle ──────────────────────────────────────── -->
  <div class="voice-toggle" id="voiceToggle" role="switch" aria-checked="false" aria-label="Voice announcement">
    <span class="toggle-emoji">🔊</span>
    <span class="toggle-label">Voice Announcement</span>
    <div class="toggle-switch" id="toggleSwitch">
      <div class="toggle-knob"></div>
    </div>
  </div>

  <!-- ── Result Card ───────────────────────────────────────── -->
  <section class="result-section">
    <div class="result-card" id="resultCard" role="status" aria-live="polite">
      <div class="result-eyebrow" id="resultEyebrow">AWAITING SCAN</div>
      <div class="result-offer" id="resultOffer">—</div>
      <div class="result-barcode" id="resultBarcode">scan a product to see its offer</div>
      <div class="result-time" id="resultTime"></div>
    </div>
  </section>

  <!-- ── Scan History ──────────────────────────────────────── -->
  <section class="history-section">
    <div class="history-header">
      <span class="history-title">Session History</span>
      <div class="history-actions">
        <button class="history-btn" id="exportBtn" aria-label="Export scan history to CSV">Export</button>
        <button class="history-btn danger" id="clearBtn" aria-label="Clear scan history">Clear</button>
      </div>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">No scans yet this session</div>
    </div>
  </section>

  <!-- ── Toast notification ────────────────────────────────── -->
  <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

  <script src="js/core.js"></script>
</body>
</html>
